# fly.toml app configuration file generated for food-bot-wandering-pond-306 on 2026-05-17T08:47:22Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'food-bot-wandering-pond-306'
primary_region = 'fra'

[build]
  builder = 'paketobuildpacks/builder:base'

[env]
  PORT = '8080'

[[mounts]]
  source = 'food_bot_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
